<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ehliyet Cepte - İndir</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        /* --- İKON PARLAMA EFEKTİ İÇİN YENİ CSS --- */

        /* İkonu çevreleyen ve parlaklığı içinde tutan kutu */
        .icon-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 35px;
            border-radius: 35px; /* Yumuşak köşeler buraya taşındı */
            overflow: hidden; /* Parlaklığın taşmasını engeller */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); /* Ana gölge */
            border: 1px solid rgba(0,0,0,0.05); /* Çok hafif sınır */
        }

        /* Gerçek resim etiketi */
        .app-icon {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Üstten geçen parlama katmanı */
        .icon-wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%; /* Başlangıçta ekranın solunda gizli */
            width: 100%;
            height: 100%;
            
            /* Eğik, beyaz, yumuşak gradyan (Parlama çizgisi) */
            background: linear-gradient(
                to right, 
                rgba(255, 255, 255, 0) 0%, 
                rgba(255, 255, 255, 0.1) 20%, /* Çok hafif başlangıç */
                rgba(255, 255, 255, 0.6) 50%, /* En parlak orta nokta */
                rgba(255, 255, 255, 0.1) 80%, /* Çok hafif bitiş */
                rgba(255, 255, 255, 0) 100%
            );
            
            transform: skewX(-25deg); /* Parlamayı eğik yapar */
            
            /* Animasyon tanımı */
            animation: shimmer 3s infinite ease-in-out;
        }

        /* Parlama animasyonu: Soldan sağa kayar */
        @keyframes shimmer {
            0% { left: -150%; }
            30% { left: 150%; } /* Hızlıca geçer */
            100% { left: 150%; } /* Bekleme süresi */
        }

        /* ------------------------------------------- */
        
        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }
        
        p {
            font-size: 17px;
            color: #64748b;
            max-width: 450px;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        
        .store-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }
        
        .store-buttons img {
            height: 65px; 
            width: auto;
            transition: transform 0.2s ease;
            cursor: pointer;
        }
        
        .store-buttons img:hover {
            transform: scale(1.04);
        }
        
        footer {
            padding: 20px 20px 30px;
            text-align: center;
            z-index: 10;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 10px;
        }
        
        .footer-links a {
            color: #94a3b8;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .footer-links a:hover {
            color: #0f172a;
        }
        
        .copyright {
            font-size: 13px;
            color: #cbd5e1;
        }

        @media (max-width: 450px) {
            .store-buttons { flex-direction: column; gap: 15px; }
            .store-buttons img { height: 55px; }
            h1 { font-size: 28px; }
            /* Mobilde kutu boyutunu ayarlıyoruz */
            .icon-wrapper { width: 130px; height: 130px; border-radius: 30px; margin-bottom: 25px; }
            p { font-size: 15px; margin-bottom: 30px; padding: 0 10px; }
            footer { padding-bottom: 25px; }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="icon-wrapper">
            <img src="https://i.hizliresim.com/4my9h6e.png" alt="Ehliyet Cepte İkonu" class="app-icon" onerror="this.style.display='none'">
        </div>
        
        <h1>Ehliyet Cepte</h1>
        <p>Ehliyet sınavına hazırlanmanın en kolay yolu. Hemen indir, çıkmış sorularla çalışmaya başla!</p>
        
        <div class="store-buttons">
            <a href="SENIN_APP_STORE_LINKIN" target="_blank" rel="noopener noreferrer">
                <img src="https://i.hizliresim.com/d6hu617.png" alt="App Store">
            </a>
            <a href="SENIN_PLAY_STORE_LINKIN" target="_blank" rel="noopener noreferrer">
                <img src="https://i.hizliresim.com/nf8krs6.png" alt="Google Play">
            </a>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="ehliyet-privacy.html">Gizlilik</a>
            <a href="ehliyet-terms.html">Koşullar</a>
        </div>
        <div class="copyright">&copy; 2026 Ehliyet Cepte.</div>
    </footer>

</body>
</html>
