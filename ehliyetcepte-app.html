<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ehliyet Cepte - İndir</title>
    <style>
        /* Modern ve Temiz CSS Kurulumu */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc; /* Göz yormayan çok açık gri/mavi tonu */
            color: #0f172a;
            height: 100vh; /* Ekranın %100'ünü kaplar */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Aşağı yukarı kaydırmayı tamamen engeller */
        }
        
        /* Ana İçerik Alanı (Tam ortalanmış) */
        .main-content {
            flex: 1; /* Kalan tüm boşluğu doldurur */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }
        
        /* Uygulama İkonu */
        .app-icon {
            width: 140px;
            height: 140px;
            border-radius: 30px; /* iOS tarzı yumuşak köşe */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            object-fit: cover;
        }
        
        h1 {
            font-size: 34px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }
        
        p {
            font-size: 17px;
            color: #64748b;
            max-width: 420px;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        
        /* Mağaza Butonları */
        .store-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: center;
        }
        
        .store-buttons img {
            height: 52px;
            width: auto;
            transition: transform 0.2s ease;
        }
        
        .store-buttons img:hover {
            transform: scale(1.05); /* Üzerine gelince hafif büyüme efekti */
        }
        
        /* Alt Bilgi (Footer) - Ekranın en altında sabit durur */
        footer {
            padding: 25px 20px;
            text-align: center;
            background-color: transparent;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 10px;
        }
        
        .footer-links a {
            color: #64748b;
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .footer-links a:hover {
            color: #0f172a;
        }
        
        .copyright {
            font-size: 13px;
            color: #94a3b8;
        }

        /* Çok küçük ekranlı telefonlar için butonları alt alta alma ayarı */
        @media (max-width: 400px) {
            .store-buttons {
                flex-direction: column;
                gap: 15px;
            }
            h1 { font-size: 28px; }
            .app-icon { width: 120px; height: 120px; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <img src="app-icon.png" alt="Ehliyet Cepte İkonu" class="app-icon" onerror="this.style.display='none'">
        
        <h1>Ehliyet Cepte</h1>
        <p>Sınava hazırlığın en kolay yolu. Çıkmış soruları çöz, denemelerle kendini test et ve ilk seferde geç.</p>
        
        <div class="store-buttons">
            <a href="SENIN_APP_STORE_LINKIN" target="_blank" rel="noopener noreferrer">
                <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/tr-tr?size=250x83&amp;releaseDate=1276560000" alt="App Store'dan İndirin">
            </a>
            
            <a href="SENIN_PLAY_STORE_LINKIN" target="_blank" rel="noopener noreferrer">
                <img src="en_badge_web_generic.png" alt="Google Play'den Alın">
            </a>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="ehliyet-privacy.html">Gizlilik Politikası</a>
            <a href="ehliyet-terms.html">Kullanım Koşulları</a>
        </div>
        <div class="copyright">&copy; 2026 Ehliyet Cepte. Tüm hakları saklıdır.</div>
    </footer>

</body>
</html>
