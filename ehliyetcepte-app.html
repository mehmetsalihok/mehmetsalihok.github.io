<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ehliyet Cepte - İndir</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        /* --- İKON PARLAMA EFEKTİ İÇİN YENİ CSS --- */
        .icon-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 35px;
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .app-icon {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .icon-wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            
            background: linear-gradient(
                to right, 
                rgba(255, 255, 255, 0) 0%, 
                rgba(255, 255, 255, 0.1) 20%,
                rgba(255, 255, 255, 0.6) 50%,
                rgba(255, 255, 255, 0.1) 80%,
                rgba(255, 255, 255, 0) 100%
            );
            
            transform: skewX(-25deg);
            animation: shimmer 3s infinite ease-in-out;
        }

        @keyframes shimmer {
            0% { left: -150%; }
            30% { left: 150%; }
            100% { left: 150%; }
        }

        /* ------------------------------------------- */
        
        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }
        
        p {
            font-size: 17px;
            color: #64748b;
            max-width: 450px;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        
        .store-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }
        
        .store-buttons img {
            height: 65px; 
            width: auto;
            transition: transform 0.2s ease;
            cursor: pointer;
        }
        
        .store-buttons a img:hover {
            transform: scale(1.04);
        }

        /* --- YAKINDA YAYINDA ROZETİ VE BUTON CSS'İ --- */
        .play-store-wrapper {
            position: relative;
            display: inline-block;
        }

        .coming-soon-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background-color: #f59e0b; /* Dikkat çekici tatlı bir turuncu */
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 12px;
            box-shadow: 0 2px 4px rgba(245, 158, 11, 0.4);
            z-index: 2;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .disabled-btn {
            opacity: 0.6;
            cursor: not-allowed !important;
            filter: grayscale(30%);
        }
        /* ------------------------------------------- */
        
        footer {
            padding: 20px 20px 30px;
            text-align: center;
            z-index: 10;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 10px;
        }
        
        .footer-links a {
            color: #94a3b8;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .footer-links a:hover {
            color: #0f172a;
        }
        
        .copyright {
            font-size: 13px;
            color: #cbd5e1;
        }

        @media (max-width: 450px) {
            .store-buttons { flex-direction: column; gap: 20px; }
            .store-buttons img { height: 55px; }
            h1 { font-size: 28px; }
            .icon-wrapper { width: 130px; height: 130px; border-radius: 30px; margin-bottom: 25px; }
            p { font-size: 15px; margin-bottom: 30px; padding: 0 10px; }
            footer { padding-bottom: 25px; }
            
            /* Mobilde rozetin konumunu ortalamak için küçük düzeltme */
            .coming-soon-badge {
                right: -5px;
            }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="icon-wrapper">
            <img src="https://i.hizliresim.com/4my9h6e.png" alt="Ehliyet Cepte İkonu" class="app-icon" onerror="this.style.display='none'">
        </div>
        
        <h1>Ehliyet Cepte</h1>
        <p>Ehliyet sınavına hazırlanmanın en kolay yolu. Hemen indir, çıkmış sorularla çalışmaya başla!</p>
        
        <div class="store-buttons">
            <a href="SENIN_APP_STORE_LINKIN" target="_blank" rel="noopener noreferrer">
                <img src="https://i.hizliresim.com/d6hu617.png" alt="App Store">
            </a>
            
            <div class="play-store-wrapper">
                <span class="coming-soon-badge">Yakında Yayında</span>
                <img src="https://i.hizliresim.com/nf8krs6.png" alt="Google Play" class="disabled-btn">
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="ehliyet-privacy.html">Gizlilik Politikası</a>
            <a href="ehliyet-terms.html">Kullanım Koşulları</a>
        </div>
        <div class="copyright">&copy; 2026 Codemso</div>
    </footer>

</body>
</html>
