<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ehliyet Cepte - İndir</title>
    <style>
        /* Modern ve Temiz CSS Kurulumu */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            
            /* Mobilde alt barın footer'ı kesmesini engelleyen sihirli dokunuş */
            height: 100vh; /* Eski tarayıcılar için yedek */
            height: 100dvh; /* Modern mobil tarayıcılar için dinamik yükseklik */
            
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Ana İçerik Alanı */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }
        
        /* İkon için nefes alan parlama animasyonu (Turuncu/Sarı tonlarında) */
        @keyframes softGlow {
            0% {
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1), 0 0 15px rgba(245, 158, 11, 0.3);
            }
            100% {
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1), 0 0 45px rgba(245, 158, 11, 0.7);
            }
        }
        
        /* Uygulama İkonu */
        .app-icon {
            width: 150px;
            height: 150px;
            border-radius: 35px;
            margin-bottom: 35px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.5);
            /* Animasyonu ikona uyguluyoruz */
            animation: softGlow 2.5s infinite alternate ease-in-out;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            color: #0f172a;
        }
        
        p {
            font-size: 17px;
            color: #64748b;
            max-width: 450px;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        
        /* Mağaza Butonları */
        .store-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }
        
        .store-buttons img {
            height: 65px; 
            width: auto;
            transition: transform 0.2s ease;
            cursor: pointer;
        }
        
        .store-buttons img:hover {
            transform: scale(1.04);
        }
        
        /* Alt Bilgi (Footer) */
        footer {
            padding: 20px 20px 30px; /* Mobilde alta yapışmaması için alt boşluğu artırdık */
            text-align: center;
            background-color: transparent;
            z-index: 10; /* Her zaman üstte kalmasını garantiliyoruz */
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 10px;
        }
        
        .footer-links a {
            color: #94a3b8;
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .footer-links a:hover {
            color: #0f172a;
        }
        
        .copyright {
            font-size: 13px;
            color: #cbd5e1;
        }

        /* Küçük ekranlı telefonlar için ince ayar */
        @media (max-width: 450px) {
            .store-buttons {
                flex-direction: column;
                gap: 15px;
            }
            .store-buttons img {
                height: 55px; 
            }
            h1 { font-size: 28px; margin-bottom: 10px; }
            .app-icon { width: 130px; height: 130px; margin-bottom: 25px; }
            p { font-size: 15px; margin-bottom: 30px; padding: 0 10px; }
            footer { padding: 15px 15px 25px; } /* Footer'ı ekrana sığdırmak için küçülttük */
        }
    </style>
</head>
<body>

    <div class="main-content">
        <img src="https://i.hizliresim.com/4my9h6e.png" alt="Ehliyet Cepte İkonu" class="app-icon" onerror="this.style.display='none'">
        
        <h1>Ehliyet Cepte</h1>
        <p>Ehliyet sınavına hazırlanmanın en kolay yolu. Hemen indir, çıkmış sorularla çalışmaya başla!</p>
        
        <div class="store-buttons">
            <a href="https://apps.apple.com/tr/app/2026-ehliyet-s%C4%B1nav-sorular%C4%B1/id6758860409?l=tr" target="_blank" rel="noopener noreferrer">
                <img src="https://i.hizliresim.com/d6hu617.png" alt="App Store'dan İndirin">
            </a>
            
            <a href="https://apps.apple.com/tr/app/2026-ehliyet-s%C4%B1nav-sorular%C4%B1/id6758860409?l=tr" target="_blank" rel="noopener noreferrer">
                <img src="https://i.hizliresim.com/nf8krs6.png" alt="Google Play'den Alın">
            </a>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="ehliyet-privacy.html">Gizlilik Politikası</a>
            <a href="ehliyet-terms.html">Kullanım Koşulları</a>
        </div>
        <div class="copyright">&copy; 2026 Ehliyet Cepte. Tüm hakları saklıdır.</div>
    </footer>

</body>
</html>
