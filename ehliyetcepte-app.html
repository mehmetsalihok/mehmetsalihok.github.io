<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ehliyet Cepte - İndir</title>
    <style>
        /* Modern ve Temiz CSS Kurulumu */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc; /* Göz yormayan açık ton */
            color: #0f172a;
            height: 100vh; /* Ekranın %100'ünü kaplar */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Aşağı yukarı kaydırmayı tamamen engeller */
        }
        
        /* Ana İçerik Alanı (Tam ortalanmış) */
        .main-content {
            flex: 1; /* Kalan tüm boşluğu doldurur */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }
        
        /* Uygulama İkonu - Linkteki görsel ve yumuşak köşeler */
        .app-icon {
            width: 150px; /* Biraz daha büyük ve belirgin */
            height: 150px;
            /* Köşeleri yumuşatma - İstediğin estetik */
            border-radius: 35px; /* iOS tarzı yumuşak köşe */
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            margin-bottom: 35px;
            object-fit: cover;
            border: 1px solid #e2e8f0; /* Hafif bir sınır */
        }
        
        h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            color: #0f172a;
        }
        
        p {
            font-size: 18px;
            color: #64748b;
            max-width: 450px;
            margin-bottom: 45px;
            line-height: 1.6;
        }
        
        /* Mağaza Butonları */
        .store-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }
        
        /* Butonların köşelerini yumuşatma */
        .store-buttons img {
            height: 65px; /* Rozetlerin yüksekliği - biraz daha büyük yaptık */
            width: auto;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            /* Köşeleri yumuşatma */
            border-radius: 15px; /* Buton köşelerini yumuşat */
        }
        
        .store-buttons img:hover {
            transform: translateY(-5px) scale(1.03); /* Üzerine gelince hafif büyüme ve yukarı kalkma efekti */
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        /* Alt Bilgi (Footer) - Ekranın en altında sabit durur */
        footer {
            padding: 30px 20px;
            text-align: center;
            background-color: transparent;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 12px;
        }
        
        .footer-links a {
            color: #64748b;
            font-size: 15px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .footer-links a:hover {
            color: #0f172a;
        }
        
        .copyright {
            font-size: 14px;
            color: #94a3b8;
        }

        /* Mobil arayüze uyum (Responsive) */
        @media (max-width: 450px) {
            .store-buttons {
                flex-direction: column;
                gap: 15px;
            }
            .store-buttons img {
                height: 60px; /* Alt alta iken biraz daha küçük */
            }
            h1 { font-size: 30px; }
            .app-icon { width: 130px; height: 130px; margin-bottom: 25px; }
            p { font-size: 17px; margin-bottom: 35px; }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <img src="https://i.hizliresim.com/4my9h6e.png" alt="Ehliyet Cepte İkonu" class="app-icon" onerror="this.style.display='none'">
        
        <h1>Ehliyet Cepte</h1>
        <p>Ehliyet sınavına hazırlanmanın en kolay yolu. Hemen indir, çıkmış sorularla çalışmaya başla!</p>
        
        <div class="store-buttons">
            <a href="SENIN_APP_STORE_LINKIN_BURAYA" target="_blank" rel="noopener noreferrer">
                <img src="https://i.hizliresim.com/d6hu617.png" alt="App Store'dan İndirin">
            </a>
            
            <a href="SENIN_PLAY_STORE_LINKIN_BURAYA" target="_blank" rel="noopener noreferrer">
                <img src="https://i.hizliresim.com/nf8krs6.png" alt="Google Play'den Alın">
            </a>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="ehliyet-privacy.html">Gizlilik Politikası</a>
            <a href="ehliyet-terms.html">Kullanım Koşulları</a>
        </div>
        <div class="copyright">&copy; 2026 Ehliyet Cepte. Tüm hakları saklıdır.</div>
    </footer>

</body>
</html>
