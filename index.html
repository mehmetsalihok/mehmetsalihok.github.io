<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codemso | Global Mobile Solutions</title>
    
    <link rel="icon" href="https://i.hizliresim.com/49omvfc.png" type="image/png">
    <link rel="apple-touch-icon" href="https://i.hizliresim.com/49omvfc.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --bg-space: #020617;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-purple: #8b5cf6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-space);
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- ARKA PLAN: 3D EFEKTLİ DÜNYA --- */
        #globe-container {
            position: absolute;
            inset: 0;
            z-index: 0;
            perspective: 1200px;
            pointer-events: none; /* Etkileşimi engelle */
            display: flex; align-items: center; justify-content: center;
            opacity: 0.6;
        }
        .globe-wrapper {
            width: 600px; height: 600px;
            transform-style: preserve-3d;
            animation: rotateGlobe 60s linear infinite;
        }
        @media (max-width: 768px) { .globe-wrapper { width: 400px; height: 400px; } }
        @keyframes rotateGlobe { from { transform: rotateY(0deg) rotateX(15deg); } to { transform: rotateY(360deg) rotateX(15deg); } }
        
        .globe-grid {
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.1) inset, 0 0 20px rgba(59, 130, 246, 0.2);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 40%, var(--bg-space) 70%),
                repeating-linear-gradient(transparent 0%, transparent 2%, rgba(59, 130, 246, 0.1) 2.5%, transparent 3%),
                repeating-linear-gradient(90deg, transparent 0%, transparent 2%, rgba(59, 130, 246, 0.1) 2.5%, transparent 3%);
        }

        /* Uçuşan Veri Çizgileri Efekti (JavaScript ile eklenecek) */
        .data-arc {
            position: absolute; top: 50%; left: 50%;
            height: 2px; background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            opacity: 0; transform-origin: left center;
            animation: flyData 4s ease-in-out infinite;
        }
        @keyframes flyData { 0% { opacity: 0; transform: translateX(0) scaleX(0); } 30% { opacity: 1; } 100% { opacity: 0; transform: translateX(200px) scaleX(1); } }

        /* --- ANA KART (CAM EFEKTİ) --- */
        .glass-panel-v2 {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9);
        }

        /* --- PARLAYAN LOGO VE METİN --- */
        .animate-pulse-slow { animation: pulseLogo 4s ease-in-out infinite; }
        @keyframes pulseLogo { 0%, 100% { filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.4)); transform: scale(1); } 50% { filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.7)); transform: scale(1.05); } }

        .cyber-text {
            background: linear-gradient(to bottom, #ffffff 40%, var(--accent-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- ALTTA KAYAN BANT (MARQUEE) --- */
        .marquee-container {
            position: absolute; bottom: 2rem; left: 0; width: 100%;
            overflow: hidden; white-space: nowrap;
            mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent);
            z-index: 10;
        }
        .marquee-content {
            display: inline-flex; gap: 2rem;
            animation: marquee 25s linear infinite;
        }
        .marquee-content:hover { animation-play-state: paused; } /* Mouse gelince dursun */
        @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        .tech-tag {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 99px;
            color: rgba(255, 255, 255, 0.6); font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
            transition: all 0.3s;
        }
        .tech-tag i { color: var(--accent-blue); font-size: 1rem; }
        .tech-tag:hover { background: rgba(59, 130, 246, 0.1); border-color: var(--accent-blue); color: #fff; }

        /* --- DİL BUTONLARI --- */
        .lang-btn { font-size: 0.7rem; font-weight: 600; color: #64748b; cursor: pointer; transition: all 0.2s; }
        .lang-btn.active { color: var(--accent-cyan); text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); }
    </style>
</head>
<body>

    <div id="globe-container">
        <div class="globe-wrapper relative flex items-center justify-center">
            <div class="globe-grid"></div>
            </div>
    </div>

    <main class="relative z-20 flex-grow flex items-center justify-center px-4 pb-20">
        <div class="glass-panel-v2 relative w-full max-w-md rounded-2xl p-8 text-center border-t border-blue-500/20">
            
            <div class="absolute top-4 right-5 flex gap-2">
                <button id="btn-tr" class="lang-btn active" onclick="setLang('tr')">TR</button>
                <span class="text-slate-700">/</span>
                <button id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
            </div>

            <div class="w-24 h-24 mx-auto mb-6 animate-pulse-slow">
                <img src="https://i.hizliresim.com/49omvfc.png" alt="Codemso Logo" class="w-full h-full object-contain">
            </div>

            <h1 class="text-4xl font-bold cyber-text mb-3 tracking-tight">Codemso</h1>
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-950/30 border border-blue-800/30 mb-8">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
                </span>
                <span id="status-text" class="text-[0.65rem] font-semibold text-cyan-300 tracking-wider uppercase">GLOBAL AĞ ÇEVRİMİÇİ</span>
            </div>

            <p id="desc-text" class="text-slate-300 leading-relaxed text-sm mb-8">
                Sınırları aşan mobil deneyimler tasarlıyoruz. Fikirlerinizi, <span class="text-blue-400 font-medium">iOS ve Android</span> ekosistemlerinde yaşayan evrensel ürünlere dönüştürüyoruz.
            </p>

            <a href="mailto:info@codemso.com" class="group relative inline-flex items-center justify-center px-8 py-3 font-medium tracking-wide text-white transition-all duration-300 bg-blue-600 rounded-xl hover:bg-blue-500 focus:ring-4 focus:ring-blue-500/30 overflow-hidden w-full sm:w-auto">
                <span class="absolute inset-0 w-full h-full bg-gradient-to-r from-blue-600 to-cyan-500 opacity-0 group-hover:opacity-100 transition-opacity"></span>
                <span class="relative flex items-center gap-2">
                    <i class="fa-regular fa-envelope"></i>
                    <span id="btn-contact">Projeyi Başlat</span>
                </span>
            </a>

        </div>
    </main>

    <div class="marquee-container">
        <div class="marquee-content">
            <div class="flex gap-2 items-center tech-group">
                <div class="tech-tag"><i class="fa-brands fa-swift"></i>Swift</div>
                <div class="tech-tag"><i class="fa-brands fa-android"></i>Kotlin</div>
                <div class="tech-tag"><i class="fa-brands fa-react"></i>React Native</div>
                <div class="tech-tag"><i class="fa-brands fa-flutter"></i>Flutter</div>
                <span class="text-slate-800 text-xl mx-2">•</span>
                <div class="tech-tag"><i class="fa-brands fa-node-js"></i>Node.js</div>
                <div class="tech-tag"><i class="fa-brands fa-python"></i>Python</div>
                <div class="tech-tag"><i class="fa-solid fa-database"></i>GraphQL</div>
                <div class="tech-tag"><i class="fa-brands fa-aws"></i>AWS Cloud</div>
                <span class="text-slate-800 text-xl mx-2">•</span>
                <div class="tech-tag"><i class="fa-brands fa-docker"></i>Docker</div>
                <div class="tech-tag"><i class="fa-solid fa-code-branch"></i>CI/CD Git</div>
            </div>
        </div>
    </div>


    <script>
        // --- DİL ÇEVİRİLERİ ---
        const translations = {
            tr: {
                status: "GLOBAL AĞ ÇEVRİMİÇİ",
                desc: "Sınırları aşan mobil deneyimler tasarlıyoruz. Fikirlerinizi, <span class='text-blue-400 font-medium'>iOS ve Android</span> ekosistemlerinde yaşayan evrensel ürünlere dönüştürüyoruz.",
                btn: "Projeyi Başlat"
            },
            en: {
                status: "GLOBAL NETWORK ONLINE",
                desc: "We design mobile experiences that transcend borders. Transforming your ideas into universal products living in <span class='text-blue-400 font-medium'>iOS and Android</span> ecosystems.",
                btn: "Start Project"
            }
        };

        function setLang(lang) {
            document.getElementById('status-text').innerHTML = translations[lang].status;
            document.getElementById('desc-text').innerHTML = translations[lang].desc;
            document.getElementById('btn-contact').innerText = translations[lang].btn;

            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
        }

        // --- MARQUEE ÇOĞALTMA (SONSUZ DÖNGÜ İÇİN) ---
        const marqueeContent = document.querySelector('.marquee-content');
        const techGroup = marqueeContent.querySelector('.tech-group');
        // İçeriği 2 kez daha klonla ki kesintisiz dönsün
        marqueeContent.appendChild(techGroup.cloneNode(true));
        marqueeContent.appendChild(techGroup.cloneNode(true));

        // --- ARKA PLAN VERİ ÇİZGİLERİ EFEKTİ ---
        const globeWrapper = document.querySelector('.globe-wrapper');
        function createDataArc() {
            const arc = document.createElement('div');
            arc.classList.add('data-arc');
            // Rastgele bir açı ve pozisyon ver
            const angle = Math.random() * 360;
            const top = Math.random() * 80 + 10; // %10 ile %90 arası yükseklik
            
            arc.style.transform = `rotate(${angle}deg) translateX(-50%)`;
            arc.style.top = `${top}%`;
            // Rastgele bir genişlik ver (çizgi uzunluğu)
            arc.style.width = `${Math.random() * 150 + 50}px`;
            
            globeWrapper.appendChild(arc);
            
            // Animasyon bitince elemanı sil
            setTimeout(() => { arc.remove(); }, 4000);
        }
        // Her 800ms'de yeni bir çizgi fırlat
        setInterval(createDataArc, 800);
    </script>

</body>
</html>
