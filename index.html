<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codemso | Mobile App Developer</title>
    
    <link rel="icon" href="https://i.hizliresim.com/49omvfc.png" type="image/png">
    <link rel="apple-touch-icon" href="https://i.hizliresim.com/49omvfc.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        /* --- TEMEL AYARLAR (KAYDIRMA YOK) --- */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 0;
            background-color: #050505; /* Çok derin siyah */
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Scroll iptal */
        }

        /* --- PROFESYONEL ARKA PLAN (GRID & HAFİF IŞIK) --- */
        .bg-grid {
            position: absolute;
            inset: 0;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black 20%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 20%, transparent 80%);
            z-index: 0;
        }

        .core-glow {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 0;
            animation: pulse-glow 8s infinite alternate ease-in-out;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* --- PREMIUM DARK GLASS KART --- */
        .glass-panel {
            background: rgba(20, 20, 22, 0.6); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.8), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* --- LOGO ANİMASYONU --- */
        @keyframes floatLogo { 
            0%, 100% { transform: translateY(0px); filter: drop-shadow(0 0 15px rgba(255,255,255,0.05)); } 
            50% { transform: translateY(-6px); filter: drop-shadow(0 10px 25px rgba(255,255,255,0.1)); } 
        }
        .animate-float { animation: floatLogo 6s ease-in-out infinite; }

        /* --- METALİK METİN PARLAMASI --- */
        .text-shimmer {
            background: linear-gradient(
                to right, 
                #71717a 20%, 
                #ffffff 50%, 
                #71717a 80%
            );
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* --- DOCK STİLİ İKONLAR --- */
        .tech-dock {
            display: inline-flex;
            align-items: center;
            gap: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 100px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .tech-icon-clean { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: #52525b; 
            transition: all 0.3s ease; 
            cursor: default; 
            position: relative;
        }
        .tech-icon-clean:hover { 
            color: #e4e4e7; 
            transform: translateY(-4px) scale(1.1); 
        }
        .tech-icon-clean i { font-size: 1.5rem; }
        
        /* İkonların altına hover durumunda gelen ince nokta */
        .tech-icon-clean::after {
            content: '';
            position: absolute;
            bottom: -8px;
            width: 4px;
            height: 4px;
            background: #e4e4e7;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s ease;
            box-shadow: 0 0 8px #fff;
        }
        .tech-icon-clean:hover::after { opacity: 1; }

        /* --- DURUM GÖSTERGESİ --- */
        .status-dot { 
            height: 6px; width: 6px; 
            background-color: #10b981; 
            border-radius: 50%; 
            display: inline-block; 
            box-shadow: 0 0 8px #10b981; 
        }

        /* --- DİL SEÇİMİ --- */
        .lang-switch { 
            font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; 
            color: #52525b; cursor: pointer; transition: all 0.3s; 
            padding: 4px 8px; border-radius: 4px;
        }
        .lang-switch.active { 
            color: #fff; 
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="core-glow"></div>

    <main class="relative z-10 w-full max-w-[26rem] px-4 mx-auto flex flex-col justify-center items-center h-full">
        
        <div class="glass-panel w-full rounded-3xl p-8 text-center text-white relative overflow-hidden flex flex-col items-center">
            
            <div class="absolute top-6 right-6 z-20 flex items-center gap-1 bg-black/40 p-1 rounded-md border border-white/5">
                <span id="btn-tr" class="lang-switch active" onclick="setLang('tr')">TR</span>
                <span id="btn-en" class="lang-switch" onclick="setLang('en')">EN</span>
            </div>

            <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>

            <div class="w-28 h-28 mx-auto mt-4 mb-4 flex items-center justify-center relative animate-float">
                <img src="https://i.hizliresim.com/49omvfc.png" alt="Codemso Logo" class="relative z-10 w-full h-full object-contain">
            </div>

            <h1 class="text-3xl font-bold tracking-tight mb-2 text-shimmer">Codemso</h1>
            
            <div class="flex items-center justify-center gap-2 mb-8 bg-black/30 px-3 py-1.5 rounded-full border border-white/5">
                <div class="status-dot"></div>
                <span id="status-text" class="text-[9px] font-semibold text-zinc-300 tracking-[0.2em] uppercase">
                    Sistem Aktif
                </span>
            </div>

            <p id="desc-text" class="text-zinc-400 font-light leading-relaxed mb-10 text-[14px] px-2 min-h-[70px]">
                Yenilikçi fikirleri, iOS ve Android ekosistemlerinde yaşayan, yüksek performanslı ve ölçeklenebilir <span class="text-zinc-200 font-medium">native mobil deneyimlere</span> dönüştürüyoruz.
            </p>

            <div class="tech-dock mb-10">
                <div class="tech-icon-clean" title="Swift">
                    <i class="fa-brands fa-swift"></i>
                </div>
                <div class="tech-icon-clean" title="Kotlin">
                    <i class="fa-brands fa-android"></i>
                </div>
                <div class="tech-icon-clean" title="Flutter">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <div class="tech-icon-clean" title="React Native">
                    <i class="fa-brands fa-react"></i>
                </div>
            </div>

            <div class="mb-6 w-full">
                <a href="mailto:info@codemso.com" class="flex items-center justify-center gap-3 text-zinc-500 hover:text-zinc-200 transition-colors duration-300 text-[13px] tracking-widest group">
                    <span class="w-6 h-[1px] bg-zinc-800 group-hover:bg-zinc-400 transition-colors"></span>
                    info@codemso.com
                    <span class="w-6 h-[1px] bg-zinc-800 group-hover:bg-zinc-400 transition-colors"></span>
                </a>
            </div>

            <div class="mt-4 flex flex-col items-center gap-3 w-full border-t border-white/5 pt-6">
                <div class="flex gap-4 text-[9px] tracking-[0.15em] font-medium text-zinc-600 uppercase">
                    <a href="privacy.html" id="link-privacy" class="hover:text-zinc-300 transition-colors">Gizlilik</a>
                    <span class="text-zinc-800">|</span>
                    <a href="terms.html" id="link-terms" class="hover:text-zinc-300 transition-colors">Kullanım</a>
                </div>
                <p class="text-center text-zinc-700 text-[9px] tracking-[0.2em] font-medium">
                    © 2026 CODEMSO
                </p>
            </div>

        </div>
    </main>

    <script>
        const translations = {
            tr: {
                status: "Sistem Aktif",
                desc: "Yenilikçi fikirleri, iOS ve Android ekosistemlerinde yaşayan, yüksek performanslı ve ölçeklenebilir <span class='text-zinc-200 font-medium'>native mobil deneyimlere</span> dönüştürüyoruz.",
                privacy: "Gizlilik",
                terms: "Kullanım"
            },
            en: {
                status: "System Online",
                desc: "Transforming innovative ideas into high-performance, scalable <span class='text-zinc-200 font-medium'>native mobile experiences</span> living in iOS and Android ecosystems.",
                privacy: "Privacy",
                terms: "Terms"
            }
        };

        function setLang(lang) {
            document.getElementById('status-text').innerText = translations[lang].status;
            document.getElementById('desc-text').innerHTML = translations[lang].desc;
            
            document.getElementById('link-privacy').innerText = translations[lang].privacy;
            document.getElementById('link-terms').innerText = translations[lang].terms;

            if (lang === 'tr') {
                document.getElementById('btn-tr').classList.add('active');
                document.getElementById('btn-en').classList.remove('active');
            } else {
                document.getElementById('btn-en').classList.add('active');
                document.getElementById('btn-tr').classList.remove('active');
            }
        }
    </script>

</body>
</html>
